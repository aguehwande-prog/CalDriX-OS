<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalDriX OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ── RESET & ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117; --bg1:#161B22; --bg2:#1C2128; --bg3:#21262D;
  --border:rgba(255,255,255,.08); --borderh:rgba(255,255,255,.16);
  --t1:#E6EDF3; --t2:#8B949E; --t3:#484F58;
  --purple:#8B5CF6; --purpled:#7C3AED; --purplel:rgba(139,92,246,.15);
  --blue:#58A6FF; --bluel:rgba(88,166,255,.12);
  --green:#3FB950; --greenl:rgba(63,185,80,.12);
  --yellow:#D29922; --yellowl:rgba(210,153,34,.12);
  --red:#F85149; --redl:rgba(248,81,73,.12);
  --gold:#C8A96E;
  --r:8px; --rs:6px; --tr:.18s ease;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
#login-screen.hidden{display:none}
.login-box{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;display:flex;flex-direction:column;gap:20px}
.login-logo{font-size:22px;font-weight:700;color:var(--t1);text-align:center;letter-spacing:-.5px}
.login-logo span{color:var(--purple)}
.login-sub{font-size:13px;color:var(--t2);text-align:center;margin-top:-12px}
.login-field{display:flex;flex-direction:column;gap:6px}
.login-field label{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.login-input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:var(--tr)}
